<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Voz de la Verdad — Radio</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="on-air-bar"></div>

    <div id="app">
        <div id="radio-status">
            <span id="status-dot" class="dot"></span>
            <span id="status-text">Conectando...</span>
        </div>

        <div id="now-playing">
            <span id="song-title">—</span>
            <span id="song-artist">—</span>
            <span id="listeners-row">
                <span id="listeners">0</span> oyentes
            </span>
        </div>

        <button id="main-button">
            <span class="btn-icon">▶</span>
            <span class="btn-label">SALIR AL AIRE</span>
            <span class="btn-sublabel">Pausar AutoDJ</span>
        </button>

        <div id="status-info">
            <span id="air-timer">00:00:00</span>
            <span id="status-message">Cargando...</span>
        </div>
    </div>

    <div id="footer">La Voz de la Verdad — Panel de Control v2.0</div>

    <script src="dist/bundle.js"></script>
</body>
</html>
